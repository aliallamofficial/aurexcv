<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback Wire | AurexCV</title>
    <link rel="stylesheet" href="/aurexcv/assets/style.css">
    <style>
        body { background: #0A0A0C; color: #fff; font-family: 'Inter', sans-serif; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #D4AF37; }
        .feed-input { width: 100%; padding: 12px; background: #141416; border: 1px solid #222; border-radius: 6px; color: #fff; margin-top: 10px; margin-bottom: 15px; font-family: inherit; }
        .btn-send { background: #D4AF37; color: #000; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Submit Feedback Wire</h1>
        <p style="color: #a0a0a5; margin-bottom: 20px;">Help us tune the quantum engine. Send your technical logs or user experience updates directly to our development core.</p>
        
        <form id="telegramFeedbackForm">
            <label>Your Signal (Email)</label>
            <input type="email" id="userEmail" required class="feed-input" placeholder="node@network.com">
            
            <label>Transmission Payload (Message)</label>
            <textarea id="userMessage" required class="feed-input" style="height: 120px;" placeholder="Describe layout anomalies, engine suggestions or feature requests..."></textarea>
            
            <button class="btn-send" type="submit" id="submitBtn">
                <span id="btnText">Transmit Message Payload</span>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('telegramFeedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const email = document.getElementById('userEmail').value;
            const message = document.getElementById('userMessage').value;

            // تفعيل حالة التحميل وتعطيل الزر لمنع التكرار
            submitBtn.disabled = true;
            btnText.textContent = "Transmitting via Secure Wire...";

            // إرسال البيانات إلى المسار الخلفي المخفي في موقعك (Vercel API)
            fetch('/api/send-feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, message: message })
            })
            .then(response => {
                if (response.ok) {
                    alert('Feedback transmitted securely via Vercel Shield straight to the core!');
                    window.location.href = '/aurexcv/';
                } else {
                    alert('Transmission failed. Connection anomalous.');
                    submitBtn.disabled = false;
                    btnText.textContent = "Transmit Message Payload";
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Network encryption error.');
                submitBtn.disabled = false;
                btnText.textContent = "Transmit Message Payload";
            });
        });
    </script>
</body>
</html>
