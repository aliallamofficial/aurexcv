<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback Wire | AurexCV</title>
    <link rel="stylesheet" href="/aurexcv/assets/style.css">
    <style>
        body { background: #0A0A0C; color: #fff; font-family: 'Inter', sans-serif; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; position: relative; }
        h1 { color: #D4AF37; }
        .feed-input { width: 100%; padding: 12px; background: #141416; border: 1px solid #222; border-radius: 6px; color: #fff; margin-top: 10px; margin-bottom: 15px; font-family: inherit; transition: border-color 0.3s; }
        .feed-input:focus { border-color: #D4AF37; outline: none; }
        .btn-send { background: #D4AF37; color: #000; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; transition: background 0.3s; }
        .btn-send:hover { background: #bda032; }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        /* تصميم نافذة التنبيه الاحترافية */
        .status-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            transform: translateY(-50px);
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .status-popup.show {
            transform: translateY(0);
            opacity: 1;
        }
        .status-popup.success {
            background: #10B981; /* أخضر */
            color: #fff;
            border-left: 5px solid #047857;
        }
        .status-popup.error {
            background: #EF4444; /* أحمر */
            color: #fff;
            border-left: 5px solid #B91C1C;
        }
    </style>
</head>
<body>

    <div id="statusPopup" class="status-popup"></div>

    <div class="container">
        <h1>Submit Feedback Wire</h1>
        <p style="color: #a0a0a5; margin-bottom: 20px;">Help us tune the quantum engine. Send your technical logs or user experience updates directly to our development core.</p>
        
        <form id="telegramFeedbackForm">
            <label>Your Signal (Email)</label>
            <input type="email" id="userEmail" required class="feed-input" placeholder="node@network.com">
            
            <label>Transmission Payload (Message)</label>
            <textarea id="userMessage" required class="feed-input" style="height: 120px;" placeholder="Describe layout anomalies, engine suggestions or feature requests..."></textarea>
            
            <button class="btn-send" type="submit" id="submitBtn">
                <span id="btnText">Transmit Message Payload</span>
            </button>
        </form>
    </div>

    <script>
        // دالة لإظهار التنبيه الاحترافي بشكل متحرك
        function showNotification(message, type) {
            const popup = document.getElementById('statusPopup');
            popup.textContent = message;
            popup.className = `status-popup show ${type}`;
            
            // إخفاء التنبيه تلقائياً بعد 4 ثوانٍ
            setTimeout(() => {
                popup.classList.remove('show');
            }, 4000);
        }

        document.getElementById('telegramFeedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const email = document.getElementById('userEmail').value;
            const message = document.getElementById('userMessage').value;

            submitBtn.disabled = true;
            btnText.textContent = "Transmitting via Secure Wire...";

            // إرسال البيانات مباشرة إلى رابط Vercel API الخاص بك
            fetch('https://aurexcv.vercel.app/api/send-feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, message: message })
            })
            .then(response => {
                if (response.ok) {
                    // رسالة نجاح احترافية متماشية مع طراز الموقع
                    showNotification('⚡ Transmission successful. Payload secure in core matrix!', 'success');
                    
                    // إعادة ضبط الاستمارة وتأخير التحويل قليلاً ليشاهد المستخدم الرسالة
                    document.getElementById('telegramFeedbackForm').reset();
                    setTimeout(() => {
                        window.location.href = '/aurexcv/';
                    }, 2000);
                } else {
                    showNotification('❌ Transmission failed. Core connection anomalous.', 'error');
                    submitBtn.disabled = false;
                    btnText.textContent = "Transmit Message Payload";
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showNotification('🚨 Network encryption error. Signal lost.', 'error');
                submitBtn.disabled = false;
                btnText.textContent = "Transmit Message Payload";
            });
        });
    </script>
</body>
</html>
