<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="L3tPSb-jmutxmhHwf_FTcPCVK69TdAetKEoSoTS7JME" />

    <title>مُحسّن السيرة الذاتية الذكي ✨</title>
    <meta name="description" content="تطبيق ذكي لتوليد وصياغة السير الذاتية الاحترافية ورسائل التغطية بالذكاء الاصطناعي واجتياز نظام الـ ATS مباشرة من متصفحك مجاناً.">
    <meta name="keywords" content="صانع سير ذاتية, تطبيق cv, ذكاء اصطناعي, ats checker, ali cv builder, سيرة ذاتية ذكية, محسن السيرة الذاتية">
    <meta name="author" content="@aliallamofficial">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div id="splash-screen">
        🚀 جاري تشغيل مُحسّن السيرة الذاتية الذكي...
    </div>

    <div class="header-menu">
        <h2>مُحسّن السيرة الذاتية الذكي ✨</h2>
        <button id="dropdownToggleBtn">⚙️</button>
        
        <div id="topLeftMenu" class="hidden">
            <button id="openSettingsBtn">⚙️ الإعدادات المتقدمة</button>
        </div>
    </div>

    <div class="container">
        
        <div id="liveTipBox">
            💡 <strong>نصيحة اليوم:</strong> <span id="liveTipText">جاري تحميل النصيحة...</span>
        </div>

        <div class="form-group">
            <input type="text" id="fullName" placeholder="الاسم الكامل">
            <input type="text" id="jobTitle" placeholder="المسمى الوظيفي المستهدف">
            <textarea id="experience" placeholder="الخبرات المهنية السابقة"></textarea>
            <textarea id="skills" placeholder="المهارات (افصل بينها بفاصلة)"></textarea>
            
            <div class="row-inputs">
                <select id="langSelect">
                    <option value="ar">اللغة العربية</option>
                    <option value="en">English</option>
                </select>
                <select id="templateSelect">
                    <option value="modern">ثيم عصري (Modern)</option>
                    <option value="classic">ثيم كلاسيكي (Classic)</option>
                    <option value="elegant">ثيم أنيق (Elegant)</option>
                </select>
            </div>

            <button id="optimizeBtn">🚀 تحسين وصياغة السيرة الذاتية</button>
            <button id="coverLetterBtn">✉️ إنشاء رسالة تغطية (Cover Letter)</button>
            
            <div class="tools-buttons">
                <button id="rateBtn">📊 تقييم السيرة الذاتية</button>
                <button id="atsCheckBtn">🔍 فحص التوافق ATS</button>
                <button id="signCvBtn">🔐 توقيع رقمي GPG</button>
            </div>
        </div>

        <div id="loading" class="hidden">
            ⏳ جاري المعالجة بواسطة مستشار الذكاء الاصطناعي الصارم...
        </div>

        <div id="resultBox"></div>

        <div id="downloadContainer" class="hidden">
            <button id="mainDownloadBtn">📥 تحميل المستند المستخرج</button>
            <div id="downloadOptions" class="hidden">
                <button id="downloadPdfBtn">📄 طباعة وحفظ بصيغة PDF</button>
                <button id="downloadWordBtn">📝 تحميل بصيغة Word (.doc)</button>
            </div>
        </div>
    </div>

    <div id="settingsPageModal" class="hidden">
        <div class="modal-content">
            <button id="closeSettingsBtn">❌</button>
            <h3>⚙️ الإعدادات المتقدمة للنظام</h3>
            
            <div class="setting-item">
                <label>نوع خط المستند:</label>
                <select id="fontFamilySelect">
                    <option value="Arial, sans-serif">Arial (افتراضي للمستندات)</option>
                    <option value="'Courier New', monospace">Courier New (تقني وعملي)</option>
                    <option value="'Times New Roman', serif">Times New Roman (رسمي وجاد)</option>
                </select>
            </div>

            <div class="setting-item">
                <label>حجم خط السيرة الذاتية:</label>
                <select id="fontSizeSelect">
                    <option value="14px">صغير (14px)</option>
                    <option value="16px" selected>متوسط (16px)</option>
                    <option value="18px">كبير (18px)</option>
                </select>
            </div>

            <div class="setting-actions">
                <button id="enableNotificationsBtn">🔔 تفعيل تنبيهات التحديثات الآلية</button>
                <button id="privacyPolicyBtn">🔒 سياسة الخصوصية والأمان</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
