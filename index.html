<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُحسّن السيرة الذاتية بالذكاء الاصطناعي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="container">
        <header>
            <h1>مُحسّن السيرة الذاتية الذكي ✨</h1>
            <p>أدخل بياناتك الحالية ودع الذكاء الاصطناعي يصيغها لك بشكل احترافي وجذاب للموظِّفين.</p>
        </header>

        <main>
            <section class="input-section">
                <h2>بياناتك الحالية</h2>
                
                <div class="form-group">
                    <label for="fullName">الاسم الكامل:</label>
                    <input type="text" id="fullName" placeholder="مثال: محمد أحمد">
                </div>

                <div class="form-group">
                    <label for="jobTitle">المسمى الوظيفي المستهدف:</label>
                    <input type="text" id="jobTitle" placeholder="مثال: مطور ويب، محاسب، مدير مشاريع">
                </div>

                <div class="form-group">
                    <label for="experience">الخبرات السابقة (اكتبها بشكل بسيط):</label>
                    <textarea id="experience" rows="5" placeholder="مثال: عملت بشركة اكس لمدة سنتين في خدمة العملاء وكنت ارد على الايميلات..."></textarea>
                </div>

                <div class="form-group">
                    <label for="skills">المهارات:</label>
                    <input type="text" id="skills" placeholder="مثال: تواصل، حل مشكلات، اكسل، تفاوض">
                </div>

                <button id="optimizeBtn">حسّن سيرتي الذاتية الآن 🚀</button>
            </section>

            <section class="output-section">
                <h2>النتيجة الاحترافية</h2>
                <div id="loading" class="hidden">جاري التحليل والتحسين عبر الذكاء الاصطناعي...</div>
                <div id="resultBox" class="result-box">
                    <p class="placeholder-text">ستظهر سيرتك الذاتية المُحسّنة هنا...</p>
                </div>
            </section>
        </main>

        <footer>
            <p>تم التطوير بكل فخر بواسطة <span class="developer-name">علي حاتم علام</span> © 2026</p>
        </footer>
    </div>

    <script src="app.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('تطبيق PWA جاهز للعمل!'))
            .catch(err => console.log('حدث خطأ في الـ PWA', err));
        });
      }
    </script>
</body>
</html>
