<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستشار السيرة الذاتية الذكي</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #10b981;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input, textarea, select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            background-color: #334155;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s, transform 0.1s;
        }

        #optimizeBtn {
            background-color: var(--primary);
            color: white;
        }

        #optimizeBtn:hover {
            background-color: var(--primary-hover);
        }

        #downloadPdfBtn {
            background-color: var(--accent);
            color: white;
            margin-top: 15px;
        }

        #downloadPdfBtn:hover {
            background-color: #059669;
        }

        .hidden {
            display: none !important;
        }

        #loading {
            text-align: center;
            margin: 20px 0;
            font-style: italic;
            color: #94a3b8;
        }

        #resultBox {
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 صانع السير الذاتية الاحترافي</h1>
    
    <div class="form-group">
        <label for="fullName">الاسم الكامل:</label>
        <input type="text" id="fullName" placeholder="أدخل اسمك الكامل">
    </div>

    <div class="form-group">
        <label for="jobTitle">المسمى الوظيفي المستهدف:</label>
        <input type="text" id="jobTitle" placeholder="مثال: مطور ويب، محاسب، مدير مبيعات">
    </div>

    <div class="form-group">
        <label for="experience">الخبرات السابقة والأنشطة:</label>
        <textarea id="experience" placeholder="اذكر الشركات المهام التي قمت بها سابقاً (اتركه فارغاً إذا كنت مبتدئاً)"></textarea>
    </div>

    <div class="form-group">
        <label for="skills">المهارات الشخصية والتقنية:</label>
        <textarea id="skills" placeholder="مثال: حل المشكلات، إدارة الوقت، مهارات التفاوض، إلخ"></textarea>
    </div>

    <div class="form-group">
        <label for="langSelect">لغة صياغة السيرة الذاتية:</label>
        <select id="langSelect">
            <option value="ar">العربية (Arabic)</option>
            <option value="en">الإنجليزية (English)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="templateSelect">اختر قالب التنسيق المرئي:</label>
        <select id="templateSelect">
            <option value="modern">حديث (أزرق داكن احترافي وبوردر جانبي)</option>
            <option value="classic">كلاسيكي أكاديمي (أبيض وأسود رسمي وعريق)</option>
            <option value="elegant">أنيق وجذاب (خلفية دافئة مع خط علوي ذهبي)</option>
        </select>
    </div>

    <button id="optimizeBtn">تحسين وصياغة السيرة الذاتية ✨</button>
    
    <button id="downloadPdfBtn" class="hidden">تحميل بصيغة PDF / طباعة فورية 🖨️</button>

    <div id="loading" class="hidden">🔄 جاري الصياغة والتحليل بذكاء مخصص...</div>
    <div id="resultBox"></div>
</div>

<script src="app.js"></script>
</body>
</html>
